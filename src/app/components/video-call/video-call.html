<div class="whatsapp-container">

  <!-- TOP BAR -->
  <header class="top-overlay-bar">

    <div class="room-panel">
      <span class="self-tag">You: {{ username() }}</span>
    </div>

    <div class="status-display">
      <span class="status-lbl">{{ callStatus() }}</span>
    </div>

  </header>

  <!-- INCOMING CALL MODAL -->
  @if(incomingCallFrom()){

    <div class="incoming-call-overlay">

      <div class="incoming-call-card">

        <p>Incoming call from <strong>{{ incomingCallFrom() }}</strong></p>

        <div class="incoming-call-actions">

          <button class="accept-btn" (click)="acceptCall()">Accept</button>

          <button class="reject-btn" (click)="rejectCall()">Reject</button>

        </div>

      </div>

    </div>

  }

  <!-- USER LIST (hidden once ringing out or connected) -->
  @if(!inCallFlow()){

    <section class="user-list">

      @for(u of otherUsers(); track u.username){

        <div class="user-row">

          <span class="user-name">{{ u.username }}</span>

          <span class="user-status" [class]="u.status.toLowerCase()">
            {{ u.status }}
          </span>

          <button
            class="call-btn"
            [disabled]="u.status !== 'ONLINE'"
            (click)="callUser(u)">
            Call
          </button>

        </div>

      } @empty {

        <p class="no-users">No other users online</p>

      }

    </section>

  }

  <!-- VIDEO AREA -->
  <main class="video-canvas" [class.hidden]="!isCallConnected()">

    <!-- REMOTE VIDEO -->
    <div
      class="video-wrapper remote-video-box"
      [class.full-screen]="!isSwapped()"
      [class.floating-screen]="isSwapped()"
      (click)="isSwapped() && swapVideos()">

      <video #remoteVideo autoplay playsinline></video>

      <div class="video-gradient"></div>

      <span class="user-tag">Remote Participant</span>

    </div>

    <!-- LOCAL VIDEO -->
    <div
      class="video-wrapper local-video-box"
      [class.full-screen]="isSwapped()"
      [class.floating-screen]="!isSwapped()"
      (click)="!isSwapped() && swapVideos()">

      <video #localVideo autoplay muted playsinline></video>

      <div class="video-gradient"></div>

      <span class="user-tag">You</span>

    </div>

  </main>

  <!-- CONTROLS -->
  <footer class="bottom-controls-drawer">

    <div class="circular-button-row">

      <!-- Mute -->
      <button
        class="circle-btn btn-utility"
        [class.muted-active]="isMuted()"
        (click)="toggleMute()"
        [disabled]="!localStream">
        {{ isMuted() ? '🔊' : '🎤' }}
      </button>

      <!-- Camera -->
      <button
        class="circle-btn btn-utility"
        [class.camera-active]="isCameraOff()"
        (click)="toggleCamera()"
        [disabled]="!localStream">
        {{ isCameraOff() ? '📷' : '📹' }}
      </button>

      <!-- End / Cancel Call -->
      <button
        class="circle-btn btn-end"
        (click)="handleEndButton()"
        [disabled]="!isCallConnected() && !isRinging()">
        📞
      </button>

      <!-- Logout -->
      <button
        class="circle-btn btn-logout"
        (click)="logout()"
        [disabled]="!canLogout()">
        🚪
      </button>

    </div>

  </footer>

</div>
